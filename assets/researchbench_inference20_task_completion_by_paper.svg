<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
<title id="title">ResearchBench inference paper task completions by model</title>
<desc id="desc">Per-paper closed headline task counts for Claude Opus 4.7 and GPT-5 Codex across the current 20-paper inference selection. The first three papers use the gate3 benchmark runs; papers 4 through 10 use the 10-paper stage1 runs; papers 12 through 20 use the 9-paper stage2 runs; Hybrid JIT is blocked and not benchmarked yet.</desc>
<rect width="100%" height="100%" fill="white"/>
<style>text { font-family: Georgia, "Times New Roman", serif; fill: #111827; } .muted { fill: #6b7280; font-size: 13px; } .small { font-size: 12px; fill: #6b7280; } .label { font-size: 14px; } .value { font-size: 12px; font-weight: 700; } .title { font-size: 28px; font-weight: 700; } .subtitle { font-size: 14px; fill: #6b7280; } .axis { font-size: 12px; fill: #6b7280; }</style>
<text x="40" y="44" class="title">ResearchBench Inference Task Completions by Paper</text>
<text x="40" y="68" class="subtitle">Closed headline tasks per paper. Claude uses the completed 3-paper gate3 run for the first three papers; Codex uses the completed gate3 post-harness run for those same papers.</text>
<text x="40" y="88" class="subtitle">Papers 4-10 use the completed 10-paper stage1 runs. Papers 12-20 use the completed 9-paper stage2 runs. Hybrid JIT remains blocked and is shown as not benchmarked.</text>
