<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Research Bench — Rubric Explorer</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="container">
    <header class="site">
      <h1>Research Bench — Rubric Explorer</h1>
      <p class="sub">Every paper in the bench, with its reproduction rubric as an explorable dependency tree. Click a paper to open its rubric.</p>
    </header>

    <div class="legend" id="legend"></div>

    <div class="searchbar">
      <input id="search" type="search" placeholder="Filter papers by title or slug…" aria-label="Filter papers" />
    </div>

    <div id="collections"><p class="empty">Loading…</p></div>
  </div>

  <script src="assets/common.js"></script>
  <script src="assets/home.js"></script>
</body>
</html>
